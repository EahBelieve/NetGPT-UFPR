name: netgpt
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.8
  - numpy=1.24.3

  # Versions officielles qui matchent CUDA 11.8
  - pytorch::pytorch=2.4.0
  - pytorch::torchvision=0.19.0
  - pytorch::torchaudio=2.4.0
  - pytorch::pytorch-cuda=11.8

  - pip
  - pip:
      - six==1.12.0
      - scapy==2.4.4
      - packaging
      - flowcontainer
      - tqdm
      - regex
